name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Install dependencies
        shell: pwsh
        run: |
          Install-Module ExchangeOnlineManagement `
          -Scope CurrentUser `
          -Force `
          -SkipPublisherCheck
          
      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      # Errors fail the build. Warnings are reported but don't fail —
      # the existing scripts have stylistic things (Write-Host etc.) that
      # are intentional for this project's CLI nature.
      - name: Lint (errors only)
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "No errors."

      - name: Lint (warnings, advisory)
        shell: pwsh
        continue-on-error: true
        run: |
          Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning | Format-Table -AutoSize
